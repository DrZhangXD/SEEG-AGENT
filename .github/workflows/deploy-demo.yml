name: Deploy live demo to GitHub Pages

# Builds the frontend in static "demo mode" (no backend / no LLM keys — every
# analysis and the chat are simulated in the browser) and publishes it to
# GitHub Pages, e.g. https://drzhangxd.github.io/seeg-agent/
#
# First-time setup: in the repo, go to Settings → Pages → "Build and deployment"
# → Source = "GitHub Actions". This workflow also tries to enable it automatically.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch: {}

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build (demo mode)
        env:
          VITE_DEMO_MODE: "1"
          # Serve from the Pages sub-path (e.g. /seeg-agent/); empty for user/org sites.
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
